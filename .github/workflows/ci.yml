name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  test-zenoh:
    name: test (zenoh-host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      # Exercise the opt-in Zenoh pub/sub wrapper. Separate job so the
      # default test matrix stays fast; this one pulls the full zenoh
      # transitive graph (~80 crates).
      - run: cargo test -p sim-hil --features zenoh-host

  build-firmware:
    name: build (thumbv7em)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      # Verify every embeddable crate's *library* compiles for thumbv7em.
      # Host-only targets (binaries / sim-hil / integration tests) are
      # deliberately excluded — they depend on std.
      - run: |
          set -e
          for crate in core-hal core-rtos core-bus \
                       algo-ekf algo-nmpc algo-indi algo-alloc algo-fdir \
                       nn-runtime comms-mavlink app-copter; do
            echo "::group::$crate"
            cargo build -p $crate --lib --target thumbv7em-none-eabihf
            echo "::endgroup::"
          done
      # And link the firmware .elf end-to-end (cortex-m-rt + memory.x +
      # app-copter lib). Catches linker regressions (missing symbols,
      # region overflow) that a --lib build would miss.
      - run: cargo build -p app-copter --bin firmware --target thumbv7em-none-eabihf --release

  kani:
    name: formal (cargo-kani)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --locked kani-verifier || true
      - run: cargo kani setup || true
      # Kani proofs live in crates with a #[cfg(kani)] module. Run per-crate
      # so a failure localises cleanly. CBMC's integer/enum harnesses finish
      # in sub-second; keep float-heavy targets off this list until we can
      # budget multi-minute runs.
      - run: |
          set -e
          for crate in core-bus core-rtos algo-fdir algo-ekf; do
            echo "::group::kani $crate"
            cargo kani -p "$crate"
            echo "::endgroup::"
          done

  geiger:
    name: unsafe audit (cargo-geiger)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-geiger --locked || true
      - run: cargo geiger --workspace --all-features || true
