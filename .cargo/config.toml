# Default build target for the workspace is the host. Firmware builds must
# pass an explicit `--target thumbv7em-none-eabihf`.

[build]
# Leave default (host) — the firmware bin opts in explicitly.

[target.thumbv7em-none-eabihf]
# `cargo run -p app-copter --bin firmware --target thumbv7em-none-eabihf`
# flashes the .elf onto a connected probe and tails the RTT log. Chip id
# matches the Pixhawk 6X FMU (STM32H753IIK6).
runner = "probe-rs run --chip STM32H753ZITx"
rustflags = [
    # defmt-rtt ships its own linker script; cortex-m-rt's link.x doesn't
    # know about the defmt section, so we include it here. link.x itself
    # is emitted by cortex-m-rt's build.rs — no need to list it.
    "-C", "link-arg=-Tdefmt.x",
    "-C", "target-cpu=cortex-m7",
    # `+fp-armv8d16sp` is an Armv8-M (M33/M55) feature; Cortex-M7's FPU
    # is VFPv5-d16sp, which is already implied by `-none-eabihf`. Omit
    # any explicit FPU feature flag to silence the rustc warning.
]

[alias]
ci-check = "check --workspace --all-targets"
ci-clippy = "clippy --workspace --all-targets -- -D warnings"
ci-test = "test --workspace"
fw-build = "build -p app-copter --target thumbv7em-none-eabihf --release"
